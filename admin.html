<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin | Streamers Federation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #050505; color: white; padding: 3rem; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-black mb-10 text-cyan-400 uppercase italic">Gestión de Accesos</h1>
        <div id="lista" class="space-y-4">
            <p class="opacity-30">Buscando solicitudes pendientes...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAclvp8IB1SS_7rnv5MVAE3kIfR6Rz6ahg",
            authDomain: "paginaweb-cf486.firebaseapp.com",
            projectId: "paginaweb-cf486",
            appId: "1:136417590997:web:6ae1e65956018d8f77ec5c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (u) => {
            if(!u) window.location.href = "login.html";
            const d = await getDoc(doc(db, "usuarios", u.uid));
            if(!d.data().isAdmin) { alert("No eres Admin"); window.location.href = "index.html"; }
        });

        onSnapshot(query(collection(db, "usuarios"), where("aprobado", "==", false)), (snap) => {
            const list = document.getElementById('lista');
            list.innerHTML = '';
            if(snap.empty) list.innerHTML = '<p class="opacity-20 uppercase tracking-widest text-xs">Sin pendientes por ahora</p>';
            snap.forEach(d => {
                const u = d.data();
                list.innerHTML += `
                    <div class="bg-white/5 p-6 rounded-3xl flex justify-between items-center border border-white/10">
                        <div><p class="font-bold text-xl text-pink-500">${u.tiktok}</p><p class="text-[10px] text-gray-500 font-bold">${u.email}</p></div>
                        <button onclick="aprobar('${d.id}')" class="bg-cyan-400 text-black px-8 py-3 rounded-2xl font-black text-[10px] uppercase hover:scale-105 transition">Aprobar</button>
                    </div>`;
            });
        });

        window.aprobar = async (id) => { await updateDoc(doc(db, "usuarios", id), { aprobado: true }); alert('Creador aprobado'); };
    </script>
</body>
</html>
