<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agencia ELArbol. Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; }
        
        .tiktok-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            /* CONFIGURACIÓN DE IMAGEN LOCAL */
            background-image: url('hueso.png'); /* REEMPLAZA 'hueso.jpg' por el nombre real de tu archivo */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.4); /* Mantiene el fondo oscuro para que el texto resalte */
        }

        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); padding: 3rem; border-radius: 2.5rem; width: 100%; max-width: 400px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #25f4ee; }
    </style>
</head>
<body>
    <div class="tiktok-bg"></div>
    <div class="card shadow-2xl">
        <h2 class="text-3xl font-black mb-8 text-center italic text-cyan-400 uppercase tracking-tighter">Login <span class="text-white">Agencia ELArbol</span></h2>
        <form id="logForm">
            <input type="email" id="email" placeholder="Correo Electrónico" required>
            <input type="password" id="pass" placeholder="Contraseña" required>
            <button class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-pink-500 hover:text-white transition-all shadow-xl shadow-white/5">Entrar</button>
        </form>
        <p class="text-center mt-6 text-[10px] text-gray-500 uppercase tracking-widest italic">¿Sin cuenta? <a href="registro.html" class="text-pink-500 underline">Solicita acceso</a></p>
        <p id="msg" class="mt-4 text-center text-[10px] font-bold text-red-500 uppercase tracking-widest"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAclvp8IB1SS_7rnv5MVAE3kIfR6Rz6ahg",
            authDomain: "paginaweb-cf486.firebaseapp.com",
            projectId: "paginaweb-cf486",
            appId: "1:136417590997:web:6ae1e65956018d8f77ec5c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('logForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const cred = await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                const userDoc = await getDoc(doc(db, "usuarios", cred.user.uid));
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if(data.aprobado === true || data.isAdmin === true) {
                        window.location.href = "lobby.html";
                    } else {
                        document.getElementById('msg').innerText = "⚠️ Cuenta en revisión por la agencia.";
                    }
                }
            } catch (err) { document.getElementById('msg').innerText = "Credenciales incorrectas."; }
        };
    </script>
</body>
</html>
