<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Agencia ELArbol.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* ESTILO PARA LA IMAGEN DE FONDO */
        .tiktok-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background-image: url('hueso.png'); /* REEMPLAZA 'tu-imagen.jpg' por el nombre de tu archivo */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.4); 
        }

        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); padding: 3rem; border-radius: 2.5rem; width: 100%; max-width: 450px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #25f4ee; }
    </style>
</head>
<body>
    <div class="tiktok-bg"></div>

    <div class="card shadow-2xl">
        <h2 class="text-3xl font-black mb-8 text-center italic uppercase">Registro <span class="text-pink-500">Agencia ELArbol</span></h2>
        <form id="form">
            <input type="text" id="code" placeholder="Código de Invitación" required>
            <input type="text" id="tiktok" placeholder="Usuario de TikTok (@...)" required>
            <input type="email" id="email" placeholder="Correo Electrónico" required>
            <input type="password" id="pass" placeholder="Crea tu Contraseña" required>
            <button class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-cyan-400 transition-all">Enviar Solicitud</button>
        </form>
        <p id="msg" class="mt-4 text-center text-[10px] font-bold uppercase"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAclvp8IB1SS_7rnv5MVAE3kIfR6Rz6ahg",
            authDomain: "paginaweb-cf486.firebaseapp.com",
            projectId: "paginaweb-cf486",
            appId: "1:136417590997:web:6ae1e65956018d8f77ec5c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value;
            if(code !== 'ELArbol2026') return alert('Código Incorrecto');
            
            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                await setDoc(doc(db, "usuarios", cred.user.uid), {
                    tiktok: document.getElementById('tiktok').value,
                    email: document.getElementById('email').value,
                    aprobado: false,
                    isAdmin: false
                });
                document.getElementById('msg').innerText = "Solicitud enviada con éxito.";
                document.getElementById('msg').style.color = "#25f4ee";
            } catch (err) { alert("Error: " + err.message); }
        };
    </script>
</body>
</html>
