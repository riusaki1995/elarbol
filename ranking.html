<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de la Fama | Agencia ELArbol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --tk-pink: #fe2c55; --tk-cyan: #25f4ee; --tk-gold: #f39c12; }
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* VIDEO DE FONDO */
        .video-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; }
        .tiktok-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, rgba(17,17,17,0.5) 0%, rgba(0,0,0,0.95) 100%); }

        /* TABLAS DE RANKING */
        .rank-column { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; padding: 1.5rem; height: fit-content; }
        
        /* PODIO */
        .podium-mini { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 2.5rem; padding: 1rem; }
        .podium-box { text-align: center; position: relative; width: 80px; }
        .podium-box img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid white; object-fit: cover; margin: 0 auto; background: #222; }
        .box-1 { width: 110px; }
        .box-1 img { width: 100px; height: 100px; border-color: var(--tk-gold); box-shadow: 0 0 20px rgba(243, 156, 18, 0.4); }
        
        /* ELEMENTOS DE LA LISTA */
        .list-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; margin-bottom: 0.6rem; transition: 0.3s; }
        .list-item:hover { border-color: var(--tk-cyan); transform: scale(1.02); background: rgba(255, 255, 255, 0.06); }

        /* --- CORRECCIÓN: COLOR DE LOS NÚMEROS (#) --- */
        .rank-number { 
            color: var(--tk-cyan); 
            font-weight: 900; 
            font-size: 0.9rem; 
            width: 30px; 
            display: inline-block;
            text-shadow: 0 0 10px rgba(37, 244, 238, 0.4);
        }

        /* ADMIN DRAWER */
        .admin-drawer { position: fixed; top: 0; right: -100%; width: 400px; height: 100%; background: #0f0f0f; border-left: 1px solid var(--tk-cyan); z-index: 3000; transition: 0.5s; padding: 2rem; overflow-y: auto; }
        .admin-drawer.active { right: 0; }
        .form-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 0.5rem; font-size: 0.75rem; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(37, 244, 238, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--tk-cyan); }
    </style>
</head>
<body class="p-4 md:p-8">

    <video class="video-bg" autoplay loop muted playsinline>
        <source src="tu-video.mp4" type="video/mp4">
    </video>
    <div class="tiktok-bg"></div>

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <a href="lobby.html" class="text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all mb-2 inline-block">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Lobby
                </a>
                <h1 class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter">MURO DE LA <span class="text-cyan-400">FAMA</span></h1>
            </div>
            <button id="btnAdmin" onclick="toggleAdmin()" class="hidden bg-white/5 border border-white/10 p-4 rounded-full hover:bg-cyan-400 hover:text-black transition-all">
                <i class="fa-solid fa-gear"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            
            <div class="rank-column">
                <h2 class="text-center font-black italic text-pink-500 mb-6 tracking-widest uppercase border-b border-pink-500/20 pb-2">
                    <i class="fa-solid fa-calendar-week mr-2"></i> Top 10 Semanal
                </h2>
                <div id="podium-semanal" class="podium-mini"></div>
                <div id="list-semanal" class="space-y-2 pr-1"></div>
            </div>

            <div class="rank-column">
                <h2 class="text-center font-black italic text-cyan-400 mb-6 tracking-widest uppercase border-b border-cyan-400/20 pb-2">
                    <i class="fa-solid fa-calendar-check mr-2"></i> Top 20 Mensual
                </h2>
                <div id="podium-mensual" class="podium-mini"></div>
                <div id="list-mensual" class="max-h-[600px] overflow-y-auto pr-2 space-y-2"></div>
            </div>

        </div>
    </div>

    <div id="adminDrawer" class="admin-drawer">
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h3 class="font-black text-cyan-400 uppercase italic">Editor SF. Ranking</h3>
            <button onclick="toggleAdmin()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        
        <div class="space-y-8">
            <div>
                <h4 class="text-pink-500 font-black mb-4 text-xs tracking-widest uppercase">Semanal (1-10)</h4>
                <div id="inputs-semanal"></div>
            </div>
            <div>
                <h4 class="text-cyan-400 font-black mb-4 text-xs tracking-widest uppercase border-t border-white/10 pt-6">Mensual (1-20)</h4>
                <div id="inputs-mensual"></div>
            </div>
        </div>

        <button onclick="saveAllRanking()" class="w-full bg-gradient-to-r from-pink-500 to-cyan-400 text-white font-black py-4 rounded-xl uppercase text-xs mt-10 sticky bottom-0 shadow-2xl">
            Actualizar Tablero 🚀
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAclvp8IB1SS_7rnv5MVAE3kIfR6Rz6ahg",
            authDomain: "paginaweb-cf486.firebaseapp.com",
            projectId: "paginaweb-cf486",
            storageBucket: "paginaweb-cf486.firebasestorage.app",
            messagingSenderId: "136417590997",
            appId: "1:136417590997:web:6ae1e65956018d8f77ec5c",
            measurementId: "G-HRPFNSDQNY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.toggleAdmin = () => document.getElementById('adminDrawer').classList.toggle('active');

        // Generar Inputs Admin automáticamente
        const createInputs = (divId, prefix, count) => {
            const container = document.getElementById(divId);
            for(let i=1; i<=count; i++) {
                container.innerHTML += `
                    <div class="flex gap-2 items-center mb-2 bg-white/5 p-2 rounded border border-white/5">
                        <span class="text-[9px] w-6 font-bold text-gray-500">#${i}</span>
                        <input type="text" id="${prefix}-user-${i}" class="form-input mb-0" placeholder="@usuario">
                        <input type="number" id="${prefix}-gems-${i}" class="form-input mb-0" placeholder="Diamantes">
                    </div>
                `;
            }
        };
        createInputs('inputs-semanal', 'sem', 10);
        createInputs('inputs-mensual', 'mes', 20);

        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists() && userDoc.data().isAdmin) document.getElementById('btnAdmin').classList.remove('hidden');

            onSnapshot(doc(db, "ajustes", "ranking_dual"), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    renderList(data.semanal, 'podium-semanal', 'list-semanal', 10);
                    renderList(data.mensual, 'podium-mensual', 'list-mensual', 20);
                    fillForm(data.semanal, 'sem');
                    fillForm(data.mensual, 'mes');
                }
            });
        });

        function renderList(list, podiumId, listId, total) {
            const podium = document.getElementById(podiumId);
            const listContainer = document.getElementById(listId);
            podium.innerHTML = ''; listContainer.innerHTML = '';

            // Render Podio (Visualmente: 2, 1, 3)
            const top3Order = [1, 0, 2]; 
            top3Order.forEach(idx => {
                const item = list[idx] || {user:'', gems:0};
                const userL = item.user.replace('@','').toLowerCase();
                const num = idx + 1;
                podium.innerHTML += `
                    <div class="podium-box box-${num}">
                        <div class="relative">
                            ${num===1 ? '<i class="fa-solid fa-crown absolute -top-6 left-1/2 -translate-x-1/2 text-yellow-500 text-xl animate-bounce"></i>' : ''}
                            <img src="${item.user ? `https://unavatar.io/tiktok/${userL}` : 'https://i.pravatar.cc/150?img=0'}" onerror="this.src='https://i.pravatar.cc/150?img=0'">
                        </div>
                        <p class="text-[10px] font-black uppercase mt-2 truncate w-full text-white">${item.user || '---'}</p>
                        <p class="text-[11px] text-cyan-400 font-bold"><i class="fa-solid fa-gem text-[9px]"></i> ${Number(item.gems).toLocaleString()}</p>
                    </div>
                `;
            });

            // Render Lista (Resto de puestos)
            for(let i=3; i<total; i++) {
                const item = list[i] || {user:'', gems:0};
                const userL = item.user.replace('@','').toLowerCase();
                listContainer.innerHTML += `
                    <div class="list-item flex items-center justify-between p-3 px-4">
                        <div class="flex items-center gap-4">
                            <span class="rank-number">#${i+1}</span>
                            <img src="${item.user ? `https://unavatar.io/tiktok/${userL}` : 'https://i.pravatar.cc/150?img=0'}" class="w-9 h-9 rounded-full border border-white/10" onerror="this.src='https://i.pravatar.cc/150?img=0'">
                            <div>
                                <h4 class="text-xs font-bold uppercase text-white">${item.user || '---'}</h4>
                                <p class="text-[8px] text-gray-500 font-black uppercase tracking-widest">Creador Agencia</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-mono text-xs text-cyan-400 font-bold">${Number(item.gems).toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }
        }

        function fillForm(list, prefix) {
            list.forEach((item, i) => {
                const u = document.getElementById(`${prefix}-user-${i+1}`);
                const g = document.getElementById(`${prefix}-gems-${i+1}`);
                if(u) u.value = item.user;
                if(g) g.value = item.gems;
            });
        }

        window.saveAllRanking = async () => {
            const getValues = (prefix, count) => {
                let arr = [];
                for(let i=1; i<=count; i++) {
                    arr.push({
                        user: document.getElementById(`${prefix}-user-${i}`).value,
                        gems: document.getElementById(`${prefix}-gems-${i}`).value || 0
                    });
                }
                return arr;
            };

            try {
                await setDoc(doc(db, "ajustes", "ranking_dual"), {
                    semanal: getValues('sem', 10),
                    mensual: getValues('mes', 20)
                });
                alert("🚀 ¡Ranking SF. Actualizado con éxito!");
                toggleAdmin();
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
